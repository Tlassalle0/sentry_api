name: Test /health route

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask app
        run: |
          python app.py &
          sleep 3

      - name: Test GET /health returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ GET /health returned $STATUS, expected 200"
            exit 1
          fi
          echo "✅ GET /health returned 200"

      - name: Test GET /health returns expected body
        run: |
          BODY=$(curl -s http://127.0.0.1:5000/health)
          echo "Response body: $BODY"
          if [[ "$BODY" != *"Healthy"* ]]; then
            echo "❌ Response body does not contain 'Healthy'"
            exit 1
          fi
          echo "✅ Response body contains 'Healthy'"